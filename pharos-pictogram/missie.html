<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharos — Missie & Visie</title>
<style>
  :root { --pp:#3d2b6e;--ppd:#2d1b5e;--ppm:#6b4f9e;--pl:#d0c4e8;--pm:#b01458;--vg:#f5c842;--vgb:#1a3e6e; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--ppd);font-family:sans-serif;color:var(--pl);overflow-x:hidden;}
  header{background:var(--ppd);border-bottom:3px solid var(--pm);display:flex;align-items:center;padding:10px 24px;gap:20px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
  .logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none;}
  .logo-circle{width:48px;height:48px;background:var(--pm);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;color:white;flex-shrink:0;}
  .back-btn{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--pl);background:var(--ppm);padding:8px 14px;border-radius:10px;font-size:13px;margin-left:auto;transition:background 0.2s;}
  .back-btn:hover{background:var(--pm);}
  .back-btn svg{width:22px;height:22px;}
  nav{display:flex;gap:6px;flex-wrap:wrap;}
  .nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:var(--pl);padding:4px 8px;border-radius:8px;transition:background 0.2s;gap:2px;}
  .nav-item:hover{background:var(--ppm);}
  /* ── ACTIEF MENU-ITEM: omcirkeld zodat je weet waar je bent ── */
  .nav-item.active {
    box-shadow: 0 0 0 2px var(--pm);
    background: rgba(176, 20, 88, 0.18);
    border-radius: 10px;
  }
  .nav-item.active .nav-label {
    color: var(--pm);
    font-weight: 700;
    opacity: 1;
  }
  .nav-item.active svg { opacity: 1; }

  .nav-item svg{width:26px;height:26px;}
  .nav-label{font-size:9px;opacity:0.85;text-align:center;}
  .hero-wrap{width:100%;overflow:hidden;background:#1a0d00;}
  .hero-wrap svg{display:block;width:100%;height:auto;}
  .panels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:32px;max-width:1280px;margin:0 auto;}
  .panel{background:var(--pp);border-radius:16px;overflow:hidden;border:2px solid var(--ppm);box-shadow:0 4px 18px rgba(0,0,0,0.4);}
  .panel svg{width:100%;height:auto;display:block;}
  .subpages-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:24px 32px 48px;max-width:1280px;margin:0 auto;}
  .subpage-link{background:var(--pp);border-radius:12px;overflow:hidden;text-decoration:none;border:2px solid var(--ppm);transition:transform 0.2s,box-shadow 0.2s;display:block;box-shadow:0 3px 12px rgba(0,0,0,0.35);}
  .subpage-link:hover{transform:translateY(-4px);border-color:var(--vg);box-shadow:0 8px 24px rgba(245,200,66,0.3);}
  .subpage-link svg{width:100%;height:auto;display:block;}
  footer{background:var(--ppd);border-top:3px solid var(--pm);padding:30px 32px 20px;}
  .footer-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
  .footer-row a{color:var(--pl);opacity:0.8;transition:opacity 0.2s;}
  .footer-row a:hover{opacity:1;}
  .footer-row svg{width:28px;height:28px;}
  @media(max-width:900px){.panels-grid,.subpages-grid{grid-template-columns:1fr;padding:16px;}}

  /* ── PHAROS TOOLTIP: echte tekst van pharos.nl ── */
  [data-tip] { position: relative; }
  [data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: #2d1b5e;
    color: #e8e0f5;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.55;
    max-width: 300px;
    width: max-content;
    white-space: normal;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 9999;
    text-align: left;
    border: 1px solid #b01458;
    box-shadow: 0 6px 20px rgba(0,0,0,0.55);
    font-family: system-ui, -apple-system, sans-serif;
  }
  [data-tip]:hover::after { opacity: 1; }
  /* Zorg dat tooltip niet buiten beeld valt */
  [data-tip]:first-child::after, .logo-wrap::after { left: 0; transform: none; }
  /* Nav-tooltips verschijnen ONDER het item, kaart-tooltips BOVEN */
  header [data-tip]::after {
    bottom: auto;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
  }
</style>
</head>

<!-- HERO: Lighthouse Mission — Rembrandt style -->
