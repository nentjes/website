<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharos — Gelijke Gezondheid</title>
<style>
  :root {
    --pp: #3d2b6e; --ppd: #2d1b5e; --ppm: #6b4f9e;
    --pl: #d0c4e8; --pm: #b01458; --vg: #f5c842; --vgb: #1a3e6e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--ppd); font-family: sans-serif; color: var(--pl); overflow-x: hidden; }
  header {
    background: var(--ppd); border-bottom: 3px solid var(--pm);
    display: flex; align-items: center; padding: 10px 24px; gap: 20px;
    position: sticky; top: 0; z-index: 100; flex-wrap: wrap;
  }
  .logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-circle {
    width: 48px; height: 48px; background: var(--pm); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 24px; color: white; flex-shrink: 0;
  }
  nav { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    text-decoration: none; color: var(--pl); padding: 4px 8px;
    border-radius: 8px; transition: background 0.2s; gap: 2px;
  }
  .nav-item:hover { background: var(--ppm); }
  .nav-item svg { width: 26px; height: 26px; }
  .nav-label { font-size: 9px; letter-spacing: 0.03em; opacity: 0.85; text-align: center; }
  .hero-wrap { width: 100%; overflow: hidden; background: #0d0525; }
  .hero-wrap svg { display: block; width: 100%; height: auto; }
  .section-divider {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; padding: 36px 20px 20px;
  }
  .cards-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 24px; padding: 0 32px 40px; max-width: 1280px; margin: 0 auto;
  }
  .card {
    background: var(--pp); border-radius: 20px; overflow: hidden;
    text-decoration: none; display: block; border: 2px solid var(--ppm);
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(176,20,88,0.4); border-color: var(--pm); }
  .card svg { width: 100%; height: auto; display: block; }
  .card-footer { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; background: var(--ppd); }
  .card-footer svg { width: 26px; height: 26px; }
  .tiles-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 18px; padding: 0 32px 60px; max-width: 1280px; margin: 0 auto;
  }
  .tile {
    background: var(--pp); border-radius: 14px; overflow: hidden;
    text-decoration: none; display: block; border: 2px solid var(--ppm);
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 3px 14px rgba(0,0,0,0.35);
  }
  .tile:hover { transform: translateY(-4px); border-color: var(--vg); box-shadow: 0 8px 28px rgba(245,200,66,0.3); }
  .tile svg { width: 100%; height: auto; display: block; }
  footer { background: var(--ppd); border-top: 3px solid var(--pm); padding: 40px 32px 24px; }
  .footer-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 32px; max-width: 1280px; margin: 0 auto 32px;
  }
  .footer-col { display: flex; flex-direction: column; gap: 12px; }
  .footer-icon-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .footer-icon-row a { color: var(--pl); opacity: 0.8; transition: opacity 0.2s; }
  .footer-icon-row a:hover { opacity: 1; }
  .footer-icon-row svg { width: 28px; height: 28px; }
  .footer-bottom { border-top: 1px solid var(--ppm); padding-top: 20px; display: flex; justify-content: center; gap: 24px; }
  @media (max-width: 900px) {
    .cards-grid, .tiles-grid { grid-template-columns: 1fr; padding: 0 16px 32px; }
    .footer-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ── PHAROS TOOLTIP: echte tekst van pharos.nl ── */
  [data-tip] { position: relative; }
  [data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: #2d1b5e;
    color: #e8e0f5;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.55;
    max-width: 300px;
    width: max-content;
    white-space: normal;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 9999;
    text-align: left;
    border: 1px solid #b01458;
    box-shadow: 0 6px 20px rgba(0,0,0,0.55);
    font-family: system-ui, -apple-system, sans-serif;
  }
  [data-tip]:hover::after { opacity: 1; }
  /* Zorg dat tooltip niet buiten beeld valt */
  [data-tip]:first-child::after, .logo-wrap::after { left: 0; transform: none; }
  /* Nav-tooltips verschijnen ONDER het item, kaart-tooltips BOVEN */
  header [data-tip]::after {
    bottom: auto;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
  }

  /* ── ACTIEF MENU-ITEM: omcirkeld zodat je weet waar je bent ── */
  .nav-item.active {
    box-shadow: 0 0 0 2px var(--pm);
    background: rgba(176, 20, 88, 0.18);
    border-radius: 10px;
  }
  .nav-item.active .nav-label {
    color: var(--pm);
    font-weight: 700;
    opacity: 1;
  }
  .nav-item.active svg { opacity: 1; }
</style>
</head>
