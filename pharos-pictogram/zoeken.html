<style>
  :root{--pp:#3d2b6e;--ppd:#2d1b5e;--ppm:#6b4f9e;--pl:#d0c4e8;--pm:#b01458;--vg:#f5c842;--vgb:#1a3e6e;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--ppd);font-family:sans-serif;color:var(--pl);overflow-x:hidden;}
  header{background:var(--ppd);border-bottom:3px solid var(--pm);display:flex;align-items:center;padding:10px 24px;gap:20px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
  .logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none;}
  .logo-circle{width:48px;height:48px;background:var(--pm);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;color:white;flex-shrink:0;}
  .back-btn{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--pl);background:var(--ppm);padding:8px 14px;border-radius:10px;margin-left:auto;transition:background 0.2s;}
  .back-btn:hover{background:var(--pm);}
  .back-btn svg{width:22px;height:22px;}
  nav{display:flex;gap:6px;flex-wrap:wrap;}
  .nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:var(--pl);padding:4px 8px;border-radius:8px;transition:background 0.2s;gap:2px;}
  .nav-item:hover{background:var(--ppm);}
  .nav-item.active{box-shadow:0 0 0 2px var(--pm);background:rgba(176,20,88,0.18);border-radius:10px;}
  .nav-item.active .nav-label{color:var(--pm);font-weight:700;opacity:1;}
  .nav-item.active svg{opacity:1;}
  .nav-item svg{width:26px;height:26px;}
  .nav-label{font-size:9px;opacity:0.85;text-align:center;}

  /* ── PHAROS TOOLTIP ── */
  [data-tip]{position:relative;}
  [data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#2d1b5e;color:#e8e0f5;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.55;max-width:300px;width:max-content;white-space:normal;pointer-events:none;opacity:0;transition:opacity 0.25s;z-index:9999;text-align:left;border:1px solid #b01458;box-shadow:0 6px 20px rgba(0,0,0,0.55);font-family:system-ui,-apple-system,sans-serif;}
  [data-tip]:hover::after{opacity:1;}
  [data-tip]:first-child::after,.logo-wrap::after{left:0;transform:none;}
  header [data-tip]::after{bottom:auto;top:calc(100% + 8px);left:50%;transform:translateX(-50%);}

  /* ── ZOEK HERO ── */
  .zoek-hero{width:100%;overflow:hidden;position:relative;}
  .zoek-hero svg{display:block;width:100%;height:auto;}

  /* ── VERGROOTGLAS ANIMATIE ── */
  @keyframes zweven{
    0%{transform:translate(0,0) rotate(-8deg);}
    25%{transform:translate(40px,-20px) rotate(5deg);}
    50%{transform:translate(-10px,15px) rotate(-12deg);}
    75%{transform:translate(30px,10px) rotate(8deg);}
    100%{transform:translate(0,0) rotate(-8deg);}
  }
  .lens-float{animation:zweven 6s ease-in-out infinite;transform-origin:center;}

  /* ── THEMA KAARTEN ── */
  .themas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:32px;max-width:1200px;margin:0 auto;}
  .thema-card{display:block;text-decoration:none;background:var(--pp);border-radius:16px;overflow:hidden;border:2px solid var(--ppm);box-shadow:0 6px 20px rgba(0,0,0,0.4);transition:transform 0.25s,border-color 0.25s,box-shadow 0.25s;position:relative;}
  .thema-card:hover{transform:translateY(-6px) scale(1.02);border-color:var(--vg);box-shadow:0 12px 32px rgba(0,0,0,0.6);}
  .thema-card svg{width:100%;height:auto;display:block;}

  /* Glow-effect bij hover */
  .thema-card::before{content:'';position:absolute;inset:0;border-radius:14px;box-shadow:inset 0 0 0 0 var(--vg);transition:box-shadow 0.3s;}
  .thema-card:hover::before{box-shadow:inset 0 0 20px rgba(245,200,66,0.15);}

  /* ── PULSE ANIMATIE op de zoekring ── */
  @keyframes pulse{0%,100%{r:62;opacity:0.6;}50%{r:70;opacity:0.2;}}
  .pulse-ring{animation:pulse 2s ease-in-out infinite;}

  footer{background:var(--ppd);border-top:3px solid var(--pm);padding:28px 32px 18px;}
  .footer-row{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;}
  .footer-row a{color:var(--pl);opacity:0.8;transition:opacity 0.2s;}
  .footer-row a:hover{opacity:1;}
  .footer-row svg{width:28px;height:28px;}
  @media(max-width:900px){.themas-grid{grid-template-columns:1fr;}}
  @media(max-width:600px){.themas-grid{grid-template-columns:repeat(2,1fr);gap:14px;padding:16px;}}
</style>
</head>
